name: Deploy Web App

on:
  push:
    branches: [main]
    paths:
      - 'webapp/**'
      - '.github/workflows/webapp-deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'webapp/**'
      - '.github/workflows/webapp-deploy.yml'

jobs:
  build_and_deploy:
    # PR-close cleanup lives in swa-cleanup.yml (a paths-filtered workflow with
    # no `closed` type never receives the close event — see that file).
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          lfs: false
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webapp/package-lock.json
      - name: Deploy to Azure Static Web Apps
        id: builddeploy
        # Pinned to the immutable v1 commit SHA (supply-chain hardening).
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9  # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "webapp"
          output_location: "dist"
          app_build_command: "npm ci && npm run build"
          api_location: ""
