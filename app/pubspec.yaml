name: clique_pix
description: Private, event-based photo sharing app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP client
  dio: ^5.4.3+1

  # Image handling
  image_picker: ^1.0.7
  flutter_image_compress: ^2.2.0
  cached_network_image: ^3.3.1
  pro_image_editor: ^5.1.4

  # Video playback (HLS preferred, MP4 fallback) — see VIDEO_ARCHITECTURE_DECISIONS Decision 4
  video_player: ^2.9.1
  chewie: ^1.8.5

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # Push notifications
  firebase_messaging: ^16.2.0
  firebase_core: ^4.7.0

  # Navigation & deep links
  go_router: ^14.0.2
  app_links: ^6.1.1

  # URL launcher (privacy policy, terms of service in-app browser)
  url_launcher: ^6.2.5

  # QR code
  qr_flutter: ^4.1.0

  # Auth
  msal_auth: ^3.3.0

  # Permissions
  permission_handler: ^11.3.1

  # Background tasks
  workmanager: ^0.9.0
  flutter_local_notifications: ^17.1.2

  # Sharing & saving
  share_plus: ^12.0.2
  path_provider: ^2.1.3
  gal: ^2.3.0

  # Realtime
  web_socket_channel: ^2.4.0

  # UI
  shimmer: ^3.0.0

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  timezone: ^0.9.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

dependency_overrides:
  vibration: ^3.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/
